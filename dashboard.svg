<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="30%" stop-color="#161b22"/>
      <stop offset="70%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="glow1" cx="15%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#ff79c6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#13162a" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="50%" stop-color="#ff79c6"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .bar-text { font-size: 13px; fill: #6272a4; }
      .name { font-size: 36px; font-weight: 800; fill: #f8f8f2; }
      .tagline { font-size: 16px; fill: #8be9fd; opacity: 0.9; }
      .k { font-size: 14px; fill: #ff79c6; font-weight: 700; }
      .v { font-size: 14px; fill: #f8f8f2; }
      .section-hdr { font-size: 12px; fill: #6272a4; letter-spacing: 2.5px; font-weight: 700; }
      .stat-val { font-size: 26px; font-weight: 800; fill: #f8f8f2; }
      .stat-label { font-size: 11px; fill: #6272a4; letter-spacing: 1px; }
      .pill-text { font-size: 12px; fill: #f8f8f2; font-weight: 700; }
      .footer { font-size: 12px; fill: #44475a; }
      .accent { fill: #bd93f9; }
      .highlight { font-size: 13px; fill: #50fa7b; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1100" height="560" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1100" height="560" rx="20" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1100" height="560" rx="20" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1100" height="560" rx="20" fill="url(#glow3)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1099" height="559" rx="20" fill="none" stroke="#30363d" stroke-opacity="0.5"/>

  <!-- Terminal bar -->
  <rect x="0" y="0" width="1100" height="42" rx="20" fill="#161b22"/>
  <rect x="0" y="20" width="1100" height="22" fill="#161b22"/>
  <line x1="0" y1="42" x2="1100" y2="42" stroke="#30363d" stroke-opacity="0.4"/>
  <circle cx="26" cy="21" r="6" fill="#ff5555"/>
  <circle cx="46" cy="21" r="6" fill="#f1fa8c"/>
  <circle cx="66" cy="21" r="6" fill="#50fa7b"/>
  <text x="550" y="26" text-anchor="middle" class="mono bar-text">arya@dev ~ dashboard.sh — zsh — 140×44</text>

  <!-- Gradient accent bar under terminal -->
  <rect x="0" y="42" width="1100" height="2" fill="url(#accentBar)" opacity="0.6"/>

  <!-- LEFT COLUMN -->
  <g transform="translate(40, 68)">
    <!-- Name -->
    <text x="0" y="28" class="mono name">Arya Mehta</text>
    <text x="0" y="52" class="mono tagline">Systems Architect • AI Engineer • Open-Source Contributor</text>

    <!-- Divider -->
    <line x1="0" y1="68" x2="460" y2="68" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Info block -->
    <g transform="translate(0, 88)">
      <text x="0" y="0" class="mono k">→ school</text>
      <text x="100" y="0" class="mono v">SJSU — MS Applied Data Science</text>

      <text x="0" y="26" class="mono k">→ stack</text>
      <text x="100" y="26" class="mono v">Python • Java • Go • TypeScript • SQL</text>

      <text x="0" y="52" class="mono k">→ focus</text>
      <text x="100" y="52" class="mono v">Multi-Agent AI • RAG • Distributed Systems</text>

      <text x="0" y="78" class="mono k">→ tools</text>
      <text x="100" y="78" class="mono v">LangGraph • Kafka • Spark • K8s • FastAPI</text>

      <text x="0" y="104" class="mono k">→ editor</text>
      <text x="100" y="104" class="mono v">Cursor + VS Code • Dracula Pro</text>

      <text x="0" y="130" class="mono k">→ os</text>
      <text x="100" y="130" class="mono v">macOS Sequoia / Linux</text>
    </g>

    <!-- Badges row -->
    <g transform="translate(0, 248)">
      <!-- Open Source badge -->
      <rect x="0" y="0" width="240" height="32" rx="16" fill="#50fa7b" fill-opacity="0.1" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="14" y="21" class="mono pill-text" fill="#50fa7b">🏆 LangGraph Contributor</text>

      <!-- Hackathon badge -->
      <rect x="252" y="0" width="200" height="32" rx="16" fill="#f1fa8c" fill-opacity="0.1" stroke="#f1fa8c" stroke-opacity="0.4"/>
      <text x="266" y="21" class="mono pill-text" fill="#f1fa8c">🥈 Hackathon Winner</text>
    </g>

    <g transform="translate(0, 290)">
      <!-- Available badge -->
      <rect x="0" y="0" width="200" height="32" rx="16" fill="#8be9fd" fill-opacity="0.1" stroke="#8be9fd" stroke-opacity="0.4"/>
      <circle cx="16" cy="16" r="4" fill="#8be9fd">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="21" class="mono pill-text" fill="#8be9fd">Open to Opportunities</text>

      <!-- Night coder -->
      <rect x="212" y="0" width="195" height="32" rx="16" fill="#bd93f9" fill-opacity="0.1" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="226" y="21" class="mono pill-text" fill="#bd93f9">🌙 I code in the dark</text>
    </g>
  </g>

  <!-- RIGHT COLUMN -->
  <g transform="translate(540, 68)">
    <text x="0" y="14" class="mono section-hdr">STATS</text>

    <!-- Stats card -->
    <rect x="0" y="26" width="520" height="170" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Row 1 -->
    <g transform="translate(32, 58)">
      <text x="0" y="0" class="mono stat-label">REPOS</text>
      <text x="0" y="30" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">43</text>
    </g>
    <g transform="translate(142, 58)">
      <text x="0" y="0" class="mono stat-label">COMMITS</text>
      <text x="0" y="30" class="mono stat-val" fill="#50fa7b" filter="url(#glow-filter)">346+</text>
    </g>
    <g transform="translate(272, 58)">
      <text x="0" y="0" class="mono stat-label">STARS</text>
      <text x="0" y="30" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">10+</text>
    </g>
    <g transform="translate(372, 58)">
      <text x="0" y="0" class="mono stat-label">OPEN SOURCE</text>
      <text x="0" y="30" class="mono stat-val" fill="#ff79c6" filter="url(#glow-filter)">✓</text>
    </g>

    <!-- Divider -->
    <line x1="32" y1="106" x2="488" y2="106" stroke="#30363d" stroke-opacity="0.25"/>

    <!-- Row 2 -->
    <g transform="translate(32, 122)">
      <text x="0" y="0" class="mono stat-label">TOP LANG</text>
      <text x="0" y="30" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">Python</text>
    </g>
    <g transform="translate(182, 122)">
      <text x="0" y="0" class="mono stat-label">SINCE</text>
      <text x="0" y="30" class="mono stat-val" fill="#8be9fd" filter="url(#glow-filter)">2021</text>
    </g>
    <g transform="translate(292, 122)">
      <text x="0" y="0" class="mono stat-label">EXPERIENCE</text>
      <text x="0" y="30" class="mono stat-val" fill="#50fa7b" filter="url(#glow-filter)">2+ yrs</text>
    </g>
    <g transform="translate(422, 122)">
      <text x="0" y="0" class="mono stat-label">HACKATHON</text>
      <text x="0" y="30" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">🥈</text>
    </g>

    <!-- SPECIALIZATIONS section -->
    <text x="0" y="228" class="mono section-hdr">SPECIALIZATIONS</text>

    <rect x="0" y="240" width="520" height="100" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Specialization pills - Row 1 -->
    <g transform="translate(20, 262)">
      <rect x="0" y="0" width="130" height="28" rx="14" fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="12" y="19" class="mono pill-text" fill="#bd93f9">Multi-Agent AI</text>

      <rect x="140" y="0" width="70" height="28" rx="14" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.4"/>
      <text x="154" y="19" class="mono pill-text" fill="#ff79c6">RAG</text>

      <rect x="220" y="0" width="115" height="28" rx="14" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="232" y="19" class="mono pill-text" fill="#50fa7b">LangGraph</text>

      <rect x="345" y="0" width="145" height="28" rx="14" fill="#8be9fd" fill-opacity="0.12" stroke="#8be9fd" stroke-opacity="0.4"/>
      <text x="357" y="19" class="mono pill-text" fill="#8be9fd">Distributed Sys</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(20, 298)">
      <rect x="0" y="0" width="80" height="28" rx="14" fill="#f1fa8c" fill-opacity="0.12" stroke="#f1fa8c" stroke-opacity="0.4"/>
      <text x="12" y="19" class="mono pill-text" fill="#f1fa8c">Kafka</text>

      <rect x="90" y="0" width="80" height="28" rx="14" fill="#ff5555" fill-opacity="0.12" stroke="#ff5555" stroke-opacity="0.4"/>
      <text x="102" y="19" class="mono pill-text" fill="#ff5555">Spark</text>

      <rect x="180" y="0" width="105" height="28" rx="14" fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="192" y="19" class="mono pill-text" fill="#bd93f9">ETL at 5TB</text>

      <rect x="295" y="0" width="100" height="28" rx="14" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.4"/>
      <text x="307" y="19" class="mono pill-text" fill="#ff79c6">FastAPI</text>

      <rect x="405" y="0" width="85" height="28" rx="14" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="417" y="19" class="mono pill-text" fill="#50fa7b">DevOps</text>
    </g>

    <!-- LANGUAGES bar section -->
    <text x="0" y="378" class="mono section-hdr">LANGUAGES</text>

    <rect x="0" y="390" width="520" height="68" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Progress bar -->
    <rect x="20" y="410" width="480" height="8" rx="4" fill="#21222c"/>
    <rect x="20" y="410" width="180" height="8" rx="4" fill="#bd93f9"/>
    <rect x="200" y="410" width="90" height="8" rx="4" fill="#50fa7b"/>
    <rect x="290" y="410" width="65" height="8" rx="4" fill="#ff79c6"/>
    <rect x="355" y="410" width="50" height="8" rx="4" fill="#8be9fd"/>
    <rect x="405" y="410" width="40" height="8" rx="4" fill="#f1fa8c"/>
    <rect x="445" y="410" width="55" height="8" rx="4" fill="#ff5555"/>

    <!-- Labels -->
    <text x="80" y="440" class="mono" font-size="10" fill="#bd93f9" text-anchor="middle">Python</text>
    <text x="230" y="440" class="mono" font-size="10" fill="#50fa7b" text-anchor="middle">Java</text>
    <text x="315" y="440" class="mono" font-size="10" fill="#ff79c6" text-anchor="middle">Go</text>
    <text x="372" y="440" class="mono" font-size="10" fill="#8be9fd" text-anchor="middle">TS</text>
    <text x="420" y="440" class="mono" font-size="10" fill="#f1fa8c" text-anchor="middle">C++</text>
    <text x="468" y="440" class="mono" font-size="10" fill="#ff5555" text-anchor="middle">SQL</text>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 530)">
    <line x1="40" y1="0" x2="1060" y2="0" stroke="#30363d" stroke-opacity="0.25"/>
    <text x="550" y="20" text-anchor="middle" class="mono footer">"I build systems that run while the world sleeps." — arya@dev</text>
  </g>
</svg>
