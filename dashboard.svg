<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <!-- Premium dark gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="30%" stop-color="#161b22"/>
      <stop offset="70%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ff79c6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Card glass effect -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#13162a" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800');
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .bar-text { font-size: 13px; fill: #6272a4; }
      .name { font-size: 38px; font-weight: 800; fill: #f8f8f2; }
      .tagline { font-size: 17px; fill: #8be9fd; opacity: 0.9; }
      .k { font-size: 15px; fill: #ff79c6; font-weight: 700; }
      .v { font-size: 15px; fill: #f8f8f2; }
      .section-hdr { font-size: 13px; fill: #6272a4; letter-spacing: 2.5px; font-weight: 700; }
      .stat-val { font-size: 28px; font-weight: 800; fill: #f8f8f2; }
      .stat-label { font-size: 12px; fill: #6272a4; letter-spacing: 1px; }
      .pill-text { font-size: 13px; fill: #f8f8f2; font-weight: 700; }
      .footer { font-size: 13px; fill: #44475a; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1100" height="520" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1100" height="520" rx="20" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1100" height="520" rx="20" fill="url(#glow2)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1099" height="519" rx="20" fill="none" stroke="#30363d" stroke-opacity="0.6"/>

  <!-- Terminal bar -->
  <rect x="0" y="0" width="1100" height="44" rx="20" fill="#161b22"/>
  <rect x="0" y="22" width="1100" height="22" fill="#161b22"/>
  <line x1="0" y1="44" x2="1100" y2="44" stroke="#30363d" stroke-opacity="0.5"/>
  <circle cx="28" cy="22" r="6" fill="#ff5555"/>
  <circle cx="50" cy="22" r="6" fill="#f1fa8c"/>
  <circle cx="72" cy="22" r="6" fill="#50fa7b"/>
  <text x="550" y="27" text-anchor="middle" class="mono bar-text">arya@dev ~ dashboard.sh — zsh — 120×40</text>

  <!-- LEFT COLUMN -->
  <g transform="translate(40, 72)">
    <!-- Name block -->
    <text x="0" y="32" class="mono name">Arya Mehta</text>
    <text x="0" y="58" class="mono tagline">Data Engineer • Systems Builder • Bay Area 🌉</text>

    <!-- Divider -->
    <line x1="0" y1="76" x2="480" y2="76" stroke="#30363d" stroke-opacity="0.5"/>

    <!-- Info block (neofetch-style) -->
    <g transform="translate(0, 100)">
      <text x="0" y="0" class="mono k">→ os</text>
      <text x="90" y="0" class="mono v">macOS Sequoia</text>

      <text x="0" y="28" class="mono k">→ editor</text>
      <text x="90" y="28" class="mono v">Cursor + VS Code</text>

      <text x="0" y="56" class="mono k">→ theme</text>
      <text x="90" y="56" class="mono v">Dracula Pro</text>

      <text x="0" y="84" class="mono k">→ stack</text>
      <text x="90" y="84" class="mono v">Python • SQL • Java • Spark • Kafka</text>

      <text x="0" y="112" class="mono k">→ focus</text>
      <text x="90" y="112" class="mono v">ETL/ELT • Streaming • Automation • AI</text>

      <text x="0" y="140" class="mono k">→ school</text>
      <text x="90" y="140" class="mono v">San Jose State University</text>
    </g>

    <!-- Status badge -->
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="200" height="34" rx="17" fill="#50fa7b" fill-opacity="0.1" stroke="#50fa7b" stroke-opacity="0.4"/>
      <circle cx="18" cy="17" r="5" fill="#50fa7b">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="22" class="mono pill-text" fill="#50fa7b">Open to Opportunities</text>
    </g>

    <!-- Moon badge -->
    <g transform="translate(215, 270)">
      <rect x="0" y="0" width="210" height="34" rx="17" fill="#bd93f9" fill-opacity="0.1" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="16" y="22" class="mono pill-text" fill="#bd93f9">🌙 I code in the dark</text>
    </g>
  </g>

  <!-- RIGHT COLUMN — Stats -->
  <g transform="translate(560, 72)">
    <text x="0" y="14" class="mono section-hdr">STATS</text>

    <!-- Stats card -->
    <rect x="0" y="26" width="500" height="180" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.5"/>

    <!-- Row 1 -->
    <g transform="translate(36, 60)">
      <text x="0" y="0" class="mono stat-label">REPOS</text>
      <text x="0" y="32" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">43</text>
    </g>
    <g transform="translate(156, 60)">
      <text x="0" y="0" class="mono stat-label">FOLLOWERS</text>
      <text x="0" y="32" class="mono stat-val" fill="#8be9fd" filter="url(#glow-filter)">8</text>
    </g>
    <g transform="translate(296, 60)">
      <text x="0" y="0" class="mono stat-label">COMMITS</text>
      <text x="0" y="32" class="mono stat-val" fill="#50fa7b" filter="url(#glow-filter)">346+</text>
    </g>
    <g transform="translate(420, 60)">
      <text x="0" y="0" class="mono stat-label">STARS</text>
      <text x="0" y="32" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">10+</text>
    </g>

    <!-- Divider -->
    <line x1="36" y1="110" x2="464" y2="110" stroke="#30363d" stroke-opacity="0.3"/>

    <!-- Row 2 -->
    <g transform="translate(36, 128)">
      <text x="0" y="0" class="mono stat-label">TOP LANG</text>
      <text x="0" y="32" class="mono stat-val" fill="#ff79c6" filter="url(#glow-filter)">Python</text>
    </g>
    <g transform="translate(196, 128)">
      <text x="0" y="0" class="mono stat-label">SINCE</text>
      <text x="0" y="32" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">2021</text>
    </g>
    <g transform="translate(320, 128)">
      <text x="0" y="0" class="mono stat-label">HACKATHON</text>
      <text x="0" y="32" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">🏆 Won</text>
    </g>

    <!-- LANGUAGES section -->
    <text x="0" y="238" class="mono section-hdr">LANGUAGES</text>

    <!-- Language bar card -->
    <rect x="0" y="250" width="500" height="110" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.5"/>

    <!-- Language progress bar -->
    <rect x="24" y="275" width="452" height="10" rx="5" fill="#21222c"/>
    <rect x="24" y="275" width="220" height="10" rx="5" fill="#bd93f9"/>
    <rect x="244" y="275" width="90" height="10" rx="5" fill="#8be9fd"/>
    <rect x="334" y="275" width="60" height="10" rx="5" fill="#ff79c6"/>
    <rect x="394" y="275" width="45" height="10" rx="5" fill="#f1fa8c"/>
    <rect x="439" y="275" width="37" height="10" rx="5" fill="#50fa7b"/>

    <!-- Language pills -->
    <g transform="translate(24, 300)">
      <rect x="0" y="0" width="85" height="28" rx="14" fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-opacity="0.5"/>
      <text x="12" y="19" class="mono pill-text" fill="#bd93f9">Python</text>

      <rect x="95" y="0" width="65" height="28" rx="14" fill="#8be9fd" fill-opacity="0.12" stroke="#8be9fd" stroke-opacity="0.5"/>
      <text x="111" y="19" class="mono pill-text" fill="#8be9fd">SQL</text>

      <rect x="170" y="0" width="68" height="28" rx="14" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.5"/>
      <text x="186" y="19" class="mono pill-text" fill="#ff79c6">Java</text>

      <rect x="248" y="0" width="78" height="28" rx="14" fill="#f1fa8c" fill-opacity="0.12" stroke="#f1fa8c" stroke-opacity="0.5"/>
      <text x="263" y="19" class="mono pill-text" fill="#f1fa8c">Spark</text>

      <rect x="336" y="0" width="78" height="28" rx="14" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.5"/>
      <text x="351" y="19" class="mono pill-text" fill="#50fa7b">Kafka</text>

      <rect x="424" y="0" width="52" height="28" rx="14" fill="#ff5555" fill-opacity="0.12" stroke="#ff5555" stroke-opacity="0.5"/>
      <text x="440" y="19" class="mono pill-text" fill="#ff5555">JS</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 490)">
    <line x1="40" y1="0" x2="1060" y2="0" stroke="#30363d" stroke-opacity="0.3"/>
    <text x="550" y="22" text-anchor="middle" class="mono footer">"Eat. Sleep. Code. Repeat." — Last updated: auto-refreshed via GitHub Actions</text>
  </g>
</svg>
