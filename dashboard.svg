<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <!-- Dracula palette -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f17"/>
      <stop offset="45%" stop-color="#1b1b2a"/>
      <stop offset="100%" stop-color="#0f0f17"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ff79c6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .top { font-size: 16px; fill: #6272a4; }
      .title { font-size: 52px; font-weight: 900; letter-spacing: 0.4px; fill: #f8f8f2; }
      .tagline { font-size: 22px; fill: #50fa7b; opacity: 0.95; }

      .k { font-size: 20px; fill: #8be9fd; opacity: 0.95; }
      .v { font-size: 20px; fill: #f8f8f2; }

      .hdr { font-size: 18px; fill: #6272a4; letter-spacing: 1.2px; }
      .statLabel { font-size: 16px; fill: #6272a4; }
      .statValue { font-size: 30px; font-weight: 900; fill: #f8f8f2; }

      .pillText { font-size: 16px; fill: #f8f8f2; }
      .muted { fill: #6272a4; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="0" y="0" width="1100" height="720" rx="34" fill="url(#bg)"/>
    <rect x="0" y="0" width="1100" height="720" rx="34" fill="url(#glow)"/>

    <!-- Terminal bar -->
    <rect x="0" y="0" width="1100" height="56" rx="34" fill="#1f1f2e" opacity="0.98"/>
    <circle cx="42" cy="28" r="10" fill="#ff5555"/>
    <circle cx="72" cy="28" r="10" fill="#f1fa8c"/>
    <circle cx="102" cy="28" r="10" fill="#50fa7b"/>

    <text x="550" y="37" text-anchor="middle" class="mono top">arya@dashboard — cursor • antigravity • vscode — dracula dark</text>

    <!-- Left: real ASCII vibe (monospace), but clean + not overpowering -->
    <g transform="translate(56,120)" class="mono" opacity="0.9">
      <text x="0" y="0" font-size="15" fill="#6272a4">
        <tspan x="0" dy="0">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣠⣤⣶⣶⣤⣄⡀</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣴⠞⠋⠀⠀⠀⠀⠀⠙⠻⣦⡀</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣴⠋⠀⠀⠀⢀⣤⣤⣤⡀⠀⠀⠈⢿⡄</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⣾⠁⠀⠀⠀⣴⠟⠉⠉⠻⣷⡀⠀⠀⠘⣷</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⣿⠀⠀⠀⠀⣿⠀⢸⣿⡇⠀⣿⠀⠀⠀⣿</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⣿⠀⠀⠀⠀⣿⠀⠈⠛⠁⠀⣿⠀⠀⠀⣿</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⢿⡄⠀⠀⠀⠻⣦⣀⣀⣴⠟⠀⠀⠀⣸⠇</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠻⣦⡀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣴⠟</tspan>
        <tspan x="0" dy="22">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠈⠻⢶⣄⣀⣀⣀⣠⡶⠟⠁</tspan>
      </text>

      <!-- Small "I code in the dark" badge under ASCII -->
      <g transform="translate(20,240)">
        <rect x="0" y="0" width="330" height="44" rx="22" fill="#282a36" stroke="#44475a"/>
        <text x="18" y="29" font-size="18" fill="#ff79c6">🌙 I code in the dark</text>
      </g>
    </g>

    <!-- Right: info block -->
    <g transform="translate(460,115)" class="mono">
      <text x="0" y="0" class="title mono">Arya's Dev Dashboard</text>
      <text x="0" y="40" class="tagline mono">I build systems that run while the world sleeps.</text>

      <rect x="0" y="70" width="600" height="1" fill="#2b2d3a"/>

      <!-- Neofetch-like lines -->
      <text x="0" y="112" class="k">os</text><text x="90" y="112" class="v">macOS / Linux</text>
      <text x="0" y="144" class="k">editor</text><text x="90" y="144" class="v">Cursor + Antigravity / VS Code</text>
      <text x="0" y="176" class="k">theme</text><text x="90" y="176" class="v">Dracula Dark</text>
      <text x="0" y="208" class="k">stack</text><text x="90" y="208" class="v">Python • SQL • Java • Spark • Kafka</text>
      <text x="0" y="240" class="k">focus</text><text x="90" y="240" class="v">ETL/ELT • Streaming • Automation</text>

      <!-- Stats panel (bigger, more like reference) -->
      <g transform="translate(0,275)">
        <text x="0" y="0" class="hdr mono">STATS</text>
        <rect x="0" y="18" width="600" height="168" rx="18" fill="#191a24" stroke="#2b2d3a"/>

        <!-- NOTE: real values can be wired in by a workflow later -->
        <text x="26" y="55" class="statLabel">repos</text>
        <text x="26" y="92" class="statValue">—</text>

        <text x="176" y="55" class="statLabel">followers</text>
        <text x="176" y="92" class="statValue">—</text>

        <text x="356" y="55" class="statLabel">commits</text>
        <text x="356" y="92" class="statValue">346+</text>

        <text x="486" y="55" class="statLabel">stars</text>
        <text x="486" y="92" class="statValue">10+</text>

        <text x="26" y="130" class="statLabel">streak</text>
        <text x="26" y="165" class="statValue">—</text>

        <text x="176" y="130" class="statLabel">LOC</text>
        <text x="176" y="165" class="statValue">—</text>

        <text x="356" y="130" class="statLabel">top lang</text>
        <text x="356" y="165" class="statValue">Python</text>
      </g>

      <!-- Languages row (unique: pill + tiny bar) -->
      <g transform="translate(0,485)">
        <text x="0" y="0" class="hdr mono">LANGUAGES</text>
        <rect x="0" y="18" width="600" height="92" rx="18" fill="#191a24" stroke="#2b2d3a"/>

        <!-- bar -->
        <rect x="24" y="46" width="552" height="12" rx="6" fill="#282a36"/>
        <rect x="24" y="46" width="310" height="12" rx="6" fill="#bd93f9"/>
        <rect x="334" y="46" width="110" height="12" rx="6" fill="#8be9fd"/>
        <rect x="454" y="46" width="70" height="12" rx="6" fill="#ff79c6"/>
        <rect x="534" y="46" width="42" height="12" rx="6" fill="#f1fa8c"/>

        <!-- pills -->
        <g transform="translate(24,66)">
          <rect x="0" y="0" width="110" height="30" rx="15" fill="#bd93f9" fill-opacity="0.15" stroke="#bd93f9" stroke-opacity="0.55"/>
          <text x="16" y="20" class="pillText">Python</text>

          <rect x="124" y="0" width="82" height="30" rx="15" fill="#8be9fd" fill-opacity="0.12" stroke="#8be9fd" stroke-opacity="0.55"/>
          <text x="146" y="20" class="pillText">SQL</text>

          <rect x="220" y="0" width="84" height="30" rx="15" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.55"/>
          <text x="240" y="20" class="pillText">Java</text>

          <rect x="318" y="0" width="96" height="30" rx="15" fill="#f1fa8c" fill-opacity="0.12" stroke="#f1fa8c" stroke-opacity="0.55"/>
          <text x="338" y="20" class="pillText">Spark</text>

          <rect x="428" y="0" width="92" height="30" rx="15" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.55"/>
          <text x="448" y="20" class="pillText">Kafka</text>
        </g>
      </g>

      <!-- Footer -->
      <text x="0" y="690" class="top mono">"Eat. Sleep. Code. Repeat."</text>
    </g>
  </g>
</svg>
