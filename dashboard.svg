<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#151a2e"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#bb9af7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .title { font-size: 56px; font-weight: 800; letter-spacing: 0.6px; fill: #c0caf5; }
      .tagline { font-size: 24px; fill: #a6e3a1; opacity: 0.95; }
      .k { font-size: 22px; fill: #7dc4e4; opacity: 0.95; }
      .v { font-size: 22px; fill: #c0caf5; }
      .muted { fill: #6b7280; }
      .sec { font-size: 18px; fill: #9aa5ce; opacity: 0.85; }
      .statLabel { font-size: 18px; fill: #9aa5ce; opacity: 0.8; }
      .statValue { font-size: 34px; font-weight: 800; fill: #c0caf5; }
      .pillText { font-size: 18px; fill: #c0caf5; }
    </style>
  </defs>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="0" y="0" width="1400" height="520" rx="34" fill="url(#bg)"/>
    <rect x="0" y="0" width="1400" height="520" rx="34" fill="url(#glow)"/>

    <!-- Terminal bar -->
    <rect x="0" y="0" width="1400" height="54" rx="34" fill="#1f2335" opacity="0.95"/>
    <circle cx="44" cy="28" r="10" fill="#F7768E"/>
    <circle cx="74" cy="28" r="10" fill="#E0AF68"/>
    <circle cx="104" cy="28" r="10" fill="#9ECE6A"/>

    <text x="700" y="36" text-anchor="middle" class="mono sec">arya@dashboard — zsh — 1400×520</text>

    <!-- Left: big ASCII portrait (kept readable + not behind text) -->
    <g transform="translate(70,120)" opacity="0.85">
      <text class="mono" x="0" y="0" font-size="18" fill="#9aa5ce">
        <tspan x="0" dy="0">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣀⣀⣀⣀⣀⣀⡀</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⠀⠀⢀⣴⠞⠉⠀⠀⠀⠀⠀⠀⠉⠳⣦⡀</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⠀⣴⠋⠀⠀⣀⣤⣤⣤⣤⣀⠀⠀⠀⠙⣧</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⣾⠁⠀⢀⣾⠟⠉⠉⠉⠉⠻⣷⡀⠀⠀⠘⣷</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⣿⠀⠀⢸⡟⠀⠀⣀⣀⠀⠀⢻⡇⠀⠀⠀⣿</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⣿⠀⠀⢸⡇⠀⢸⣿⣿⡇⠀⢸⡇⠀⠀⠀⣿</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⣿⠀⠀⢸⡇⠀⠈⠛⠛⠁⠀⢸⡇⠀⠀⠀⣿</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⢿⡀⠀⠈⢿⣆⠀⠀⠀⠀⣠⡿⠁⠀⠀⢀⡿</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⠀⠻⣦⡀⠀⠙⠻⢶⣶⠟⠋⠀⠀⢀⣴⠟</tspan>
        <tspan x="0" dy="24">⠀⠀⠀⠀⠀⠀⠀⠈⠻⢶⣄⣀⠀⠀⠀⣀⣠⡶⠟⠁</tspan>
      </text>
    </g>

    <!-- Right content block -->
    <g transform="translate(640,110)" class="mono">
      <text x="0" y="0" class="title mono">Arya's Dev Dashboard</text>
      <text x="0" y="42" class="tagline mono">Dream. Build. Ship. Repeat.</text>

      <!-- Divider -->
      <rect x="0" y="70" width="700" height="1" fill="#2a2f45"/>

      <!-- System lines (like neofetch) -->
      <text x="0" y="110" class="k">os</text>
      <text x="90" y="110" class="v">macOS / Linux</text>

      <text x="0" y="145" class="k">editor</text>
      <text x="90" y="145" class="v">VS Code / Neovim</text>

      <text x="0" y="180" class="k">stack</text>
      <text x="90" y="180" class="v">Data Eng • Distributed Systems • AI</text>

      <text x="0" y="215" class="k">focus</text>
      <text x="90" y="215" class="v">Pipelines • Streaming • Automation</text>

      <!-- Stats row -->
      <g transform="translate(0,255)">
        <rect x="0" y="0" width="700" height="150" rx="18" fill="#1f2335" opacity="0.75"/>

        <text x="30" y="42" class="statLabel">repos</text>
        <text x="30" y="82" class="statValue">—</text>

        <text x="200" y="42" class="statLabel">commits</text>
        <text x="200" y="82" class="statValue">2500+</text>

        <text x="405" y="42" class="statLabel">streak</text>
        <text x="405" y="82" class="statValue">—</text>

        <text x="555" y="42" class="statLabel">stars</text>
        <text x="555" y="82" class="statValue">10+</text>

        <!-- Language pills -->
        <g transform="translate(30,105)">
          <rect x="0" y="0" width="118" height="34" rx="17" fill="#7aa2f7" fill-opacity="0.18" stroke="#7aa2f7" stroke-opacity="0.45"/>
          <text x="18" y="23" class="pillText">Python</text>

          <rect x="132" y="0" width="92" height="34" rx="17" fill="#94e2d5" fill-opacity="0.16" stroke="#94e2d5" stroke-opacity="0.45"/>
          <text x="156" y="23" class="pillText">SQL</text>

          <rect x="238" y="0" width="92" height="34" rx="17" fill="#f5c2e7" fill-opacity="0.14" stroke="#f5c2e7" stroke-opacity="0.45"/>
          <text x="260" y="23" class="pillText">Java</text>

          <rect x="344" y="0" width="112" height="34" rx="17" fill="#f8bd96" fill-opacity="0.14" stroke="#f8bd96" stroke-opacity="0.45"/>
          <text x="366" y="23" class="pillText">Spark</text>

          <rect x="470" y="0" width="132" height="34" rx="17" fill="#a6e3a1" fill-opacity="0.12" stroke="#a6e3a1" stroke-opacity="0.45"/>
          <text x="490" y="23" class="pillText">Kafka</text>
        </g>
      </g>

      <!-- Footer -->
      <text x="0" y="445" class="sec">"Eat. Sleep. Code. Repeat."</text>
    </g>
  </g>
</svg>
