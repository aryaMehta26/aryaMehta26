    <text x="260" y="230" fill="#f8bd96">zsh/bash</text>
    <text x="440" y="230" fill="#cba6f7">🎨 Theme:</text>
    <text x="590" y="230" fill="#fca7ea">tokyonight</text>

    <text x="160" y="270" fill="#f9e2af">⏰ Uptime:</text>
